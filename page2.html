<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <title>Attendance Tracker</title>

    <style>
        body {
            background-color: #b7dcff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bocks {
            margin-top: 50px;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .attendance-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .attendance-col {
            flex: 1 1 320px;
            min-width: 320px;
        }
        #plot-container {
            min-height: 420px;
        }
        .bocks h1,
        .bocks h2 {
            color: #130081;
        }
        .bocks p {
            color: #333333;
        }
        nav {
            background-color: #130081;
        }
        
    </style>

</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">10-Sapphire   2025-2026</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Classmate List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="page2.html">Attendance Tracker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page3.html">Class Activities</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    
    <!--Attendance Tracker-->
    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <div class="container">
        <div class="bocks">
            <h1>Attendance Tracker</h1>
            <p>Choose the day of the week and enter the number of absences.</p>

            <div class="mb-3">
                <label for="day" class="form-label">Day of the Week</label>
                <select id="day" class="form-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="absence" class="form-label">Number of Absences</label>
                <input id="absence" type="number" min="0" value="0" class="form-control" />
            </div>

            <button class="btn btn-primary" py-click="displaying">Add Absence</button>
        </div>

        <div class="bocks" id="plot-container">
            <h2 class="h4">Attendance Graph</h2>
            <div id="plot-area"></div>
            <py-script src="main2.py"></py-script>
        </div>
    </div>
</body>
